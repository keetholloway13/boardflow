<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>BoardFlow</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0b0d; --card: #13151a; --card2: #1a1d24; --card3: #21252e;
  --border: #2a2f3a; --accent: #e8ff47; --blue: #47b8ff; --red: #ff5f5f;
  --green: #3dffaa; --purple: #b47fff; --orange: #ff9f47;
  --text: #eef0f4; --text2: #7a8494; --text3: #3d4555; --r: 12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow-x: hidden; }
body { font-family: 'Syne', sans-serif; background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }
.screen { display: none; min-height: 100vh; }
.screen.active { display: flex; flex-direction: column; }

/* AUTH */
#screen-auth { align-items: center; justify-content: center; padding: 24px; background: radial-gradient(ellipse 70% 50% at 50% -10%, #1c2240 0%, var(--bg) 65%); }
.auth-box { width: 100%; max-width: 400px; background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 36px 32px; }
.logo { display: flex; align-items: center; gap: 10px; margin-bottom: 32px; }
.logo-sq { width: 34px; height: 34px; background: var(--accent); border-radius: 8px; display: grid; place-items: center; }
.logo-sq svg { width: 18px; height: 18px; }
.logo-name { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
.logo-name span { color: var(--accent); }
.auth-title { font-size: 26px; font-weight: 700; margin-bottom: 6px; }
.auth-sub { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text2); margin-bottom: 28px; }
.seg { display: flex; background: var(--card2); border-radius: 10px; padding: 4px; margin-bottom: 22px; }
.seg-btn { flex: 1; padding: 10px; border: none; border-radius: 7px; background: transparent; color: var(--text2); font-family: 'Syne', sans-serif; font-weight: 700; font-size: 13px; cursor: pointer; transition: all 0.18s; touch-action: manipulation; }
.seg-btn.on { background: var(--card3); color: var(--text); box-shadow: 0 2px 6px rgba(0,0,0,0.4); }
.field { margin-bottom: 14px; }
.field label { display: block; font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 500; letter-spacing: 1.2px; text-transform: uppercase; color: var(--text2); margin-bottom: 7px; }
.field input, .field select, .field textarea { width: 100%; padding: 13px 15px; background: var(--card2); border: 1.5px solid var(--border); border-radius: var(--r); color: var(--text); font-family: 'DM Mono', monospace; font-size: 14px; outline: none; transition: border-color 0.18s; -webkit-appearance: none; appearance: none; }
.field textarea { resize: vertical; min-height: 72px; font-size: 13px; line-height: 1.5; }
.field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); }
.big-btn { width: 100%; padding: 15px; border: none; border-radius: var(--r); font-family: 'Syne', sans-serif; font-weight: 700; font-size: 15px; cursor: pointer; touch-action: manipulation; transition: opacity 0.15s, transform 0.1s; margin-top: 6px; }
.big-btn:active { opacity: 0.85; transform: scale(0.98); }
.big-btn-accent { background: var(--accent); color: #0a0b0d; }
.big-btn-ghost { background: var(--card2); color: var(--text); border: 1.5px solid var(--border); }
.big-btn-red { background: rgba(255,95,95,0.1); color: var(--red); border: 1.5px solid rgba(255,95,95,0.2); }

/* TOPBAR */
#screen-app { min-height: 100vh; }
.topbar { position: sticky; top: 0; z-index: 50; background: var(--card); border-bottom: 1px solid var(--border); padding: 0 18px; height: 56px; display: flex; align-items: center; justify-content: space-between; }
.topbar-left { display: flex; align-items: center; gap: 12px; }
.topbar-logo { font-size: 17px; font-weight: 800; letter-spacing: -0.4px; }
.topbar-logo span { color: var(--accent); }
.co-badge { background: var(--card2); border: 1px solid var(--border); padding: 3px 10px; border-radius: 20px; font-size: 11px; font-family: 'DM Mono', monospace; color: var(--text2); max-width: 120px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.topbar-right { display: flex; align-items: center; gap: 8px; }
.pill { display: flex; align-items: center; gap: 7px; background: var(--card2); border: 1px solid var(--border); border-radius: 20px; padding: 5px 10px 5px 5px; }
.av { width: 26px; height: 26px; border-radius: 50%; display: grid; place-items: center; font-size: 10px; font-weight: 700; color: #0a0b0d; }
.pill-name { font-size: 12px; font-weight: 600; max-width: 80px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.admin-chip { font-size: 9px; font-family: 'DM Mono', monospace; background: var(--accent); color: #0a0b0d; padding: 2px 6px; border-radius: 8px; font-weight: 600; }
.icon-btn { width: 34px; height: 34px; border: 1.5px solid var(--border); background: var(--card2); border-radius: 9px; display: grid; place-items: center; cursor: pointer; touch-action: manipulation; color: var(--text2); transition: all 0.15s; flex-shrink: 0; }
.icon-btn:active { background: var(--card3); }
.icon-btn svg { width: 15px; height: 15px; }

/* TABS */
.tabs { background: var(--card); border-bottom: 1px solid var(--border); display: flex; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
.tabs::-webkit-scrollbar { display: none; }
.tab-btn { flex-shrink: 0; padding: 14px 18px; border: none; background: transparent; color: var(--text2); font-family: 'Syne', sans-serif; font-weight: 600; font-size: 13px; cursor: pointer; touch-action: manipulation; border-bottom: 2px solid transparent; transition: all 0.18s; white-space: nowrap; }
.tab-btn.on { color: var(--text); border-bottom-color: var(--accent); }

/* CONTENT */
.content { padding: 18px; max-width: 1400px; margin: 0 auto; }
.view { display: none; } .view.on { display: block; }

/* BOARD */
.board-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; gap: 10px; flex-wrap: wrap; }
.board-head h2 { font-size: 20px; font-weight: 700; }
.board-actions { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.date-tag { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text2); background: var(--card); border: 1px solid var(--border); padding: 4px 11px; border-radius: 20px; }
.sm-btn { padding: 8px 14px; border-radius: 9px; border: none; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 12px; cursor: pointer; touch-action: manipulation; transition: all 0.15s; white-space: nowrap; }
.sm-btn:active { opacity: 0.8; }
.sm-btn-accent { background: var(--accent); color: #0a0b0d; }
.sm-btn-ghost { background: var(--card); border: 1.5px solid var(--border); color: var(--text2); }
.sm-btn-red { background: rgba(255,95,95,0.1); border: 1.5px solid rgba(255,95,95,0.2); color: var(--red); }

/* ALL CLEAR */
.all-clear-banner { text-align: center; padding: 32px 20px 20px; grid-column: 1/-1; animation: popIn 0.45s cubic-bezier(0.175,0.885,0.32,1.275); }
@keyframes popIn { from { transform: scale(0.85); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.all-clear-icon { font-size: 52px; margin-bottom: 10px; }
.all-clear-title { font-size: 22px; font-weight: 800; color: var(--green); margin-bottom: 4px; }
.all-clear-sub { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text2); }

/* QUEUE */
.queue-section { background: var(--card); border: 1.5px dashed var(--border); border-radius: 16px; margin-bottom: 20px; overflow: hidden; transition: border-color 0.2s, background 0.2s; }
.queue-section.drag-over { border-color: var(--orange); background: rgba(255,159,71,0.05); }
.queue-head { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; cursor: pointer; touch-action: manipulation; user-select: none; }
.queue-head-left { display: flex; align-items: center; gap: 10px; }
.queue-label { font-size: 13px; font-weight: 700; color: var(--orange); }
.queue-count { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text2); background: var(--card2); padding: 2px 8px; border-radius: 10px; }
.queue-hint { font-size: 11px; font-family: 'DM Mono', monospace; color: var(--text3); }
.queue-body { padding: 10px; }
.queue-tasks { display: flex; flex-wrap: wrap; gap: 8px; min-height: 20px; }
.queue-empty { font-size: 11px; font-family: 'DM Mono', monospace; color: var(--text3); padding: 8px 4px; }
.queue-collapsed .queue-body { display: none; }

/* QUEUE CHIP */
.q-chip { display: flex; align-items: center; gap: 8px; background: var(--card2); border: 1.5px solid var(--border); border-radius: 9px; padding: 9px 12px; cursor: grab; touch-action: none; transition: all 0.15s; max-width: 300px; }
.q-chip:active { cursor: grabbing; } .q-chip.dragging { opacity: 0.4; }
.q-chip-text { font-size: 12px; font-weight: 600; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.q-chip-assign { background: none; border: 1px solid var(--border); color: var(--text2); font-family: 'Syne', sans-serif; font-size: 10px; font-weight: 700; border-radius: 6px; padding: 3px 7px; cursor: pointer; touch-action: manipulation; white-space: nowrap; flex-shrink: 0; }
.q-chip-assign:active { border-color: var(--accent); color: var(--accent); }
.q-chip-del { background: none; border: none; color: var(--text3); cursor: pointer; touch-action: manipulation; padding: 2px 5px; font-size: 16px; line-height: 1; flex-shrink: 0; }
.q-chip-del:active { color: var(--red); }

/* COLUMNS */
.cols { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); gap: 14px; }
.emp-col { background: var(--card); border: 1.5px solid var(--border); border-radius: 16px; overflow: hidden; transition: border-color 0.2s, box-shadow 0.2s; }
.emp-col.drag-over { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(232,255,71,0.1); }
.emp-col.all-done { border-color: rgba(61,255,170,0.3); }
.emp-head { padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 11px; }
.emp-av { width: 36px; height: 36px; border-radius: 9px; display: grid; place-items: center; font-size: 13px; font-weight: 700; color: #0a0b0d; flex-shrink: 0; }
.emp-info { flex: 1; min-width: 0; }
.emp-name { font-size: 14px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.emp-role { font-size: 11px; color: var(--text2); font-family: 'DM Mono', monospace; margin-top: 1px; }
.emp-count { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text3); flex-shrink: 0; }
.emp-count b { color: var(--green); }
.emp-count.done-count { color: var(--green); font-weight: 700; }

/* column toolbar */
.col-toolbar { padding: 8px 10px 0; display: flex; gap: 6px; }
.col-tool-btn { flex: 1; padding: 6px; background: transparent; border: 1px solid var(--border); border-radius: 7px; color: var(--text3); font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700; cursor: pointer; touch-action: manipulation; transition: all 0.15s; }
.col-tool-btn:active, .col-tool-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(232,255,71,0.06); }

.col-done-banner { margin: 8px 10px 0; padding: 7px 12px; background: rgba(61,255,170,0.07); border: 1px solid rgba(61,255,170,0.18); border-radius: 8px; font-size: 11px; font-family: 'DM Mono', monospace; color: var(--green); text-align: center; }
.task-list { padding: 10px; min-height: 60px; }
.task-row { display: flex; align-items: flex-start; gap: 9px; background: var(--card2); border: 1px solid var(--border); border-radius: 9px; padding: 11px 12px; margin-bottom: 7px; transition: background 0.15s; cursor: pointer; }
.task-row:active { background: var(--card3); }
.task-row.done { opacity: 0.45; }
.check-box { width: 24px; height: 24px; border: 2px solid var(--border); border-radius: 6px; flex-shrink: 0; display: grid; place-items: center; cursor: pointer; touch-action: manipulation; transition: all 0.18s; }
.check-box.checked { background: var(--green); border-color: var(--green); }
.check-box svg { display: none; width: 13px; height: 13px; }
.check-box.checked svg { display: block; }
.task-body { flex: 1; min-width: 0; }
.task-text { font-size: 13px; font-weight: 600; line-height: 1.4; word-break: break-word; }
.task-row.done .task-text { text-decoration: line-through; color: var(--text3); }
.task-meta { display: flex; align-items: center; gap: 6px; margin-top: 5px; flex-wrap: wrap; }
.p-badge { font-size: 10px; font-family: 'DM Mono', monospace; padding: 1px 6px; border-radius: 4px; }
.p-low  { background: rgba(61,255,170,0.1);  color: var(--green); }
.p-mid  { background: rgba(232,255,71,0.1);  color: var(--accent); }
.p-high { background: rgba(255,95,95,0.12);  color: var(--red); }
.task-time { font-size: 10px; font-family: 'DM Mono', monospace; color: var(--text3); }
.task-note-preview { font-size: 10px; font-family: 'DM Mono', monospace; color: var(--blue); margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.del-btn { background: none; border: none; color: var(--text3); cursor: pointer; touch-action: manipulation; padding: 4px; border-radius: 5px; display: grid; place-items: center; min-width: 28px; min-height: 28px; transition: all 0.15s; flex-shrink: 0; }
.del-btn:active { color: var(--red); background: rgba(255,95,95,0.1); }
.del-btn svg { width: 13px; height: 13px; }
.add-row { padding: 0 10px 10px; }
.add-task-btn { width: 100%; padding: 10px; background: transparent; border: 1.5px dashed var(--border); border-radius: 8px; color: var(--text3); font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700; cursor: pointer; touch-action: manipulation; transition: all 0.18s; }
.add-task-btn:active { border-color: var(--accent); color: var(--accent); }
.empty-col { padding: 28px 16px; text-align: center; font-size: 12px; font-family: 'DM Mono', monospace; color: var(--text3); }
.drop-hint { text-align: center; font-size: 11px; font-family: 'DM Mono', monospace; color: var(--text3); padding: 10px; border: 1.5px dashed var(--border); border-radius: 8px; margin: 4px; display: none; }
.dragging-active .drop-hint { display: block; }
.dragging-active .empty-col { display: none; }

/* HISTORY */
.hist-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; flex-wrap: wrap; gap: 10px; }
.hist-head h2 { font-size: 20px; font-weight: 700; }
.hist-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 14px; }
.day-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
.day-head { padding: 13px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.day-date { font-size: 13px; font-weight: 700; }
.day-stat { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text2); }
.prog { height: 2px; background: var(--card2); }
.prog-fill { height: 100%; background: var(--green); }
.day-body { padding: 12px 16px; }
.day-emp { display: flex; align-items: center; gap: 8px; padding: 5px 0; border-bottom: 1px solid var(--card2); }
.day-emp:last-child { border-bottom: none; }
.day-emp-name { font-size: 12px; font-weight: 600; flex: 1; }
.day-emp-stat { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text2); }
.day-tasks { padding-left: 16px; margin-bottom: 4px; }
.day-task-item { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text3); padding: 2px 0; display: flex; align-items: flex-start; gap: 5px; }
.day-task-item.done { color: var(--green); }
.day-task-note { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--blue); padding-left: 14px; margin-bottom: 2px; opacity: 0.85; }

/* TEAM */
.team-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; flex-wrap: wrap; gap: 10px; }
.team-head h2 { font-size: 20px; font-weight: 700; }
.team-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 12px; }
.team-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 18px; display: flex; align-items: center; gap: 13px; }
.team-av { width: 44px; height: 44px; border-radius: 11px; display: grid; place-items: center; font-size: 15px; font-weight: 700; color: #0a0b0d; flex-shrink: 0; }
.team-info { flex: 1; min-width: 0; }
.team-name { font-size: 14px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.team-role { font-size: 11px; color: var(--text2); font-family: 'DM Mono', monospace; margin-top: 2px; }

/* MODAL */
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 200; align-items: flex-end; justify-content: center; backdrop-filter: blur(3px); }
.overlay.on { display: flex; }
.modal { background: var(--card); border: 1px solid var(--border); border-radius: 20px 20px 0 0; padding: 28px 24px 36px; width: 100%; max-width: 480px; max-height: 92vh; overflow-y: auto; }
@media (min-width: 600px) { .overlay { align-items: center; padding: 20px; } .modal { border-radius: 20px; } }
.modal-title { font-size: 18px; font-weight: 700; margin-bottom: 22px; }
.modal-drag { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 20px; display: block; }
@media (min-width: 600px) { .modal-drag { display: none; } }
.modal-row { display: flex; gap: 10px; margin-top: 14px; }
.modal-row .big-btn { margin-top: 0; }

/* NOTE THREAD */
.note-section-label { font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 500; letter-spacing: 1.2px; text-transform: uppercase; color: var(--text2); margin-bottom: 8px; margin-top: 18px; }
.note-thread { display: flex; flex-direction: column; gap: 7px; max-height: 180px; overflow-y: auto; margin-bottom: 10px; padding-right: 2px; }
.note-thread::-webkit-scrollbar { width: 3px; }
.note-thread::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
.note-bubble { padding: 8px 12px; border-radius: 10px; }
.note-bubble.mine { background: rgba(71,184,255,0.1); border: 1px solid rgba(71,184,255,0.18); }
.note-bubble.theirs { background: var(--card2); border: 1px solid var(--border); }
.note-who { font-size: 9px; letter-spacing: 0.8px; text-transform: uppercase; color: var(--text3); margin-bottom: 3px; font-family: 'DM Mono', monospace; }
.note-text { font-family: 'DM Mono', monospace; font-size: 12px; line-height: 1.5; color: var(--text); }
.note-empty { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text3); }

/* ASSIGN MODAL */
.emp-pick-list { display: flex; flex-direction: column; gap: 8px; max-height: 300px; overflow-y: auto; }
.emp-pick-row { display: flex; align-items: center; gap: 12px; padding: 12px 14px; background: var(--card2); border: 1.5px solid var(--border); border-radius: 10px; cursor: pointer; touch-action: manipulation; transition: all 0.15s; }
.emp-pick-row:active { border-color: var(--accent); background: var(--card3); }
.emp-pick-av { width: 32px; height: 32px; border-radius: 8px; display: grid; place-items: center; font-size: 12px; font-weight: 700; color: #0a0b0d; flex-shrink: 0; }
.emp-pick-name { font-size: 13px; font-weight: 700; }
.emp-pick-role { font-size: 11px; color: var(--text2); font-family: 'DM Mono', monospace; }

/* TOAST */
#toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--card3); border: 1px solid var(--border); border-radius: 12px; padding: 12px 20px; font-size: 13px; font-weight: 600; white-space: nowrap; z-index: 999; transition: transform 0.3s, opacity 0.3s; opacity: 0; display: flex; align-items: center; gap: 8px; pointer-events: none; }
#toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
.toast-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
.spinner { width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 40px auto; }
@keyframes spin { to { transform: rotate(360deg); } }
.empty { text-align: center; padding: 60px 20px; color: var(--text3); font-size: 13px; line-height: 1.7; }
.empty-icon { font-size: 40px; margin-bottom: 12px; opacity: 0.4; }
.c0{background:#e8ff47}.c1{background:#47b8ff}.c2{background:#ff5f5f}.c3{background:#b47fff}
.c4{background:#ff9f47}.c5{background:#3dffaa}.c6{background:#ff47b4}.c7{background:#ffe047}
.hide { display: none !important; }
@media (max-width: 480px) { .auth-box{padding:28px 20px;} .content{padding:14px;} .topbar{padding:0 14px;} .co-badge{display:none;} }
</style>
</head>
<body>

<!-- AUTH -->
<div id="screen-auth" class="screen active">
  <div class="auth-box">
    <div class="logo">
      <div class="logo-sq"><svg viewBox="0 0 18 18" fill="#0a0b0d"><rect x="1" y="1" width="7" height="7" rx="1.5"/><rect x="10" y="1" width="7" height="7" rx="1.5"/><rect x="1" y="10" width="7" height="7" rx="1.5"/><rect x="10" y="10" width="7" height="7" rx="1.5"/></svg></div>
      <div class="logo-name">Board<span>Flow</span></div>
    </div>
    <h1 class="auth-title">Sign In</h1>
    <p class="auth-sub">// company task board</p>
    <div class="seg">
      <button class="seg-btn on" id="seg-admin">Admin</button>
      <button class="seg-btn" id="seg-emp">Employee</button>
    </div>

<div id="toast"><div class="toast-dot"></div><span id="toast-msg"></span></div>

<script>
// ═══════════════════════════════════
const SUPABASE_URL = 'https://iifrdjrnmsodqpmnaqby.supabase.co';
const SUPABASE_KEY = 'sb_publishable_5KtxU1RruupmthUWz25xpA_NMqvAi7-';
// ═══════════════════════════════════

const COLORS    = ['c0','c1','c2','c3','c4','c5','c6','c7'];
const PRI_ORDER = { high: 0, mid: 1, low: 2 };
const sb        = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const LS        = { get: k=>{ try{return JSON.parse(localStorage.getItem(k));}catch(e){return null;} }, set:(k,v)=>{ try{localStorage.setItem(k,JSON.stringify(v));}catch(e){} } };

let session       = LS.get('bf_session') || {};
let employees     = [];
let tasks         = {};
let unassigned    = [];
let loginRole     = 'admin';
let addTaskEmpId  = null;
let assigningId   = null;
let dragTaskId    = null;
let detailTaskId  = null;
let detailEmpId   = null;
let colSorted     = {};   // empId → bool

const $      = id => document.getElementById(id);
const show   = id => $(id).classList.remove('hide');
const hide   = id => $(id).classList.add('hide');
const initials = n => (n||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
const todayKey = () => new Date().toISOString().slice(0,10);
const colorFor = i => COLORS[i%COLORS.length];
const esc      = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

let toastTimer;
function toast(msg, color) {
  $('toast-msg').textContent = msg;
  $('toast').querySelector('.toast-dot').style.background = color||'var(--green)';
  $('toast').classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>$('toast').classList.remove('show'), 2800);
}

// ── DB ──────────────────────────────────────────────
async function dbGetCompany(name)          { const {data}=await sb.from('companies').select('*').ilike('name',name).maybeSingle(); return data; }
async function dbCreateCompany(name, pin)  { const {data}=await sb.from('companies').insert({name,pin}).select().single(); return data; }
async function dbUpdatePin(id, pin)        { await sb.from('companies').update({pin}).eq('id',id); }
async function dbGetEmployees(cid)         { const {data}=await sb.from('employees').select('*').eq('company_id',cid).order('created_at'); return data||[]; }
async function dbAddEmployee(cid,name,role){ const {data}=await sb.from('employees').insert({company_id:cid,name,role}).select().single(); return data; }
async function dbRemoveEmployee(id)        { await sb.from('employees').delete().eq('id',id); }
async function dbGetTasks(cid, since)      { const {data}=await sb.from('tasks').select('*').eq('company_id',cid).gte('date_key',since).order('created_at'); return data||[]; }
async function dbAddTask(cid,eid,dk,title,priority) { const {data}=await sb.from('tasks').insert({company_id:cid,employee_id:eid,date_key:dk,title,priority,done:false}).select().single(); return data; }
async function dbToggleTask(id,done)       { await sb.from('tasks').update({done,completed_at:done?new Date().toISOString():null}).eq('id',id); }
async function dbEditTask(id,title,priority){ await sb.from('tasks').update({title,priority}).eq('id',id); }
async function dbSaveNote(id,note)         { await sb.from('tasks').update({note}).eq('id',id); }
async function dbDeleteTask(id)            { await sb.from('tasks').delete().eq('id',id); }
async function dbAssignTask(id,eid)        { await sb.from('tasks').update({employee_id:eid}).eq('id',id); }

// ── AUTH ────────────────────────────────────────────
function switchLoginRole(role) {
  loginRole = role;
  $('seg-admin').classList.toggle('on', role==='admin');
  $('seg-emp').classList.toggle('on',   role==='employee');
  $('f-name-wrap').classList.toggle('hide', role==='employee');
  $('f-pin-wrap').classList.toggle('hide',  role==='employee');
  $('f-emp-wrap').classList.toggle('hide',  role==='admin');
  if (role==='employee') loadEmpSelect();
}

async function loadEmpSelect() {
  const co  = $('f-company').value.trim();
  const sel = $('f-emp-sel');
  sel.innerHTML = '<option value="">— select your name —</option>';
  if (!co) return;
  const company = await dbGetCompany(co);
  if (!company) return;
  const emps = await dbGetEmployees(company.id);
  emps.forEach(e => { const o=document.createElement('option'); o.value=e.id; o.textContent=e.name; sel.appendChild(o); });
}

async function doLogin() {
  const company = $('f-company').value.trim();
  if (!company) { toast('Enter company name','var(--red)'); return; }
  $('btn-enter').textContent='Loading…'; $('btn-enter').disabled=true;
  try {
    if (loginRole==='admin') {
      const name=$('f-name').value.trim(), pin=$('f-pin').value.trim();
      if (!name) { toast('Enter your name','var(--red)'); return; }
      if (!pin)  { toast('Enter a PIN','var(--red)'); return; }
      let co = await dbGetCompany(company);
      if (!co) {
        const confirm=$('f-pin-confirm').value.trim();
        if (pin!==confirm) { toast('PINs do not match','var(--red)'); return; }
        if (pin.length<4)  { toast('PIN must be at least 4 digits','var(--red)'); return; }
        co = await dbCreateCompany(company, pin);
      } else {
        if (pin!==co.pin) { toast('Wrong PIN','var(--red)'); return; }
      }
      session = { role:'admin', companyName:co.name, companyId:co.id, userName:name, userColor:COLORS[0] };
    } else {
      const empId=$('f-emp-sel').value;
      if (!empId) { toast('Select your name','var(--red)'); return; }
      const co = await dbGetCompany(company);
      if (!co) { toast('Company not found','var(--red)'); return; }
      const emps = await dbGetEmployees(co.id);
      const emp  = emps.find(e=>e.id===empId);
      if (!emp) { toast('Employee not found','var(--red)'); return; }
      session = { role:'employee', companyName:co.name, companyId:co.id, userName:emp.name, userColor:colorFor(emps.indexOf(emp)), userId:emp.id };
    }
    LS.set('bf_session', session);
    await enterApp();
  } catch(err) { toast('Error: '+err.message,'var(--red)'); }
  finally { $('btn-enter').textContent='Enter Board →'; $('btn-enter').disabled=false; }
}

// ── APP INIT ────────────────────────────────────────
async function enterApp() {
  $('screen-auth').classList.remove('active');
  $('screen-app').classList.add('active');
  $('nav-co').textContent   = session.companyName;
  $('nav-name').textContent = session.userName;
  $('nav-av').textContent   = initials(session.userName);
  $('nav-av').className     = 'av '+(session.userColor||COLORS[0]);
  if (session.role==='admin') {
    show('nav-admin');
    document.querySelectorAll('.admin-el').forEach(e=>e.classList.remove('hide'));
    document.querySelectorAll('.admin-tab').forEach(e=>e.classList.remove('hide'));
  }
  $('today-label').textContent = new Date().toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'});
  await loadAll();
}

async function loadAll() {
  employees = await dbGetEmployees(session.companyId);
  const cutoff = new Date(); cutoff.setDate(cutoff.getDate()-30);
  const rawTasks = await dbGetTasks(session.companyId, cutoff.toISOString().slice(0,10));
  tasks={}; unassigned=[];
  rawTasks.forEach(t => {
    if (!t.employee_id) { if (t.date_key===todayKey()) unassigned.push(t); return; }
    if (!tasks[t.date_key]) tasks[t.date_key]={};
    if (!tasks[t.date_key][t.employee_id]) tasks[t.date_key][t.employee_id]=[];
    tasks[t.date_key][t.employee_id].push(t);
  });
  renderBoard(); renderHistory(); renderTeam();
}

// ── QUEUE ───────────────────────────────────────────
function renderQueue() {
  const isAdmin = session.role==='admin';
  $('queue-count').textContent = unassigned.length;
  const c = $('queue-tasks');
  if (!unassigned.length) { c.innerHTML='<span class="queue-empty">No unassigned tasks</span>'; return; }
  c.innerHTML = unassigned.map(t => {
    const pc = t.priority==='high'?'p-high':t.priority==='low'?'p-low':'p-mid';
    return `<div class="q-chip" draggable="${isAdmin}" data-task="${t.id}">
      <span class="q-chip-text">${esc(t.title)}</span>
      <span class="p-badge ${pc}">${t.priority}</span>
      ${isAdmin?`<button class="q-chip-assign" data-action="open-assign" data-task="${t.id}">Assign</button>`:''}
      ${isAdmin?`<button class="q-chip-del" data-action="del-unassigned" data-task="${t.id}">×</button>`:''}
    </div>`;
  }).join('');
  if (isAdmin) setupDragFromQueue();
}

// ── BOARD ───────────────────────────────────────────
function renderBoard() {
  renderQueue();
  const isAdmin    = session.role==='admin';
  const today      = todayKey();
  const todayTasks = tasks[today]||{};
  const grid       = $('board-cols');

  if (!employees.length) {
    grid.innerHTML=`<div class="empty"><div class="empty-icon">📋</div>${isAdmin?'No employees yet.<br>Add one with <b>+ Employee</b>.':'No employees set up yet.'}</div>`;
    return;
  }

  // Global all-clear check
  let totalAll=0, doneAll=0;
  employees.forEach(emp=>{ const et=todayTasks[emp.id]||[]; totalAll+=et.length; doneAll+=et.filter(t=>t.done).length; });
  const globalAllDone = totalAll>0 && doneAll===totalAll;

  const colsHTML = employees.map((emp,idx) => {
    const color  = colorFor(idx);
    let empTasks = todayTasks[emp.id]||[];
    const total  = empTasks.length;
    const doneCount = empTasks.filter(t=>t.done).length;
    const allDone   = total>0 && doneCount===total;
    if (colSorted[emp.id]) empTasks=[...empTasks].sort((a,b)=>PRI_ORDER[a.priority]-PRI_ORDER[b.priority]);

    const taskHTML = !empTasks.length
      ? `<div class="empty-col">no tasks yet</div><div class="drop-hint">drop here</div>`
      : empTasks.map(t=>{
          const pc   = t.priority==='high'?'p-high':t.priority==='low'?'p-low':'p-mid';
          const time = new Date(t.created_at).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
          const noteP = t.note?`<div class="task-note-preview">💬 ${esc(t.note.split('\n').filter(Boolean)[0]?.split('||')[1]||t.note.split('\n')[0])}</div>`:'';
          return `<div class="task-row ${t.done?'done':''}" data-action="open-detail" data-task="${t.id}" data-emp="${emp.id}">
            <div class="check-box ${t.done?'checked':''}" data-action="toggle" data-task="${t.id}" data-emp="${emp.id}">
              <svg viewBox="0 0 13 13" fill="none"><polyline points="1.5,6.5 5,10 11.5,3" stroke="#0a0b0d" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </div>
            <div class="task-body">
              <div class="task-text">${esc(t.title)}</div>
              <div class="task-meta"><span class="p-badge ${pc}">${t.priority}</span><span class="task-time">${time}</span></div>
              ${noteP}
            </div>
            ${isAdmin?`<button class="del-btn" data-action="del-task" data-task="${t.id}" data-emp="${emp.id}"><svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.8"><line x1="2" y1="2" x2="12" y2="12"/><line x1="12" y1="2" x2="2" y2="12"/></svg></button>`:''}
          </div>`;
        }).join('')+'<div class="drop-hint">drop here</div>';

    return `<div class="emp-col ${allDone?'all-done':''}" id="col-${emp.id}" data-emp="${emp.id}">
      <div class="emp-head">
        <div class="emp-av ${color}">${initials(emp.name)}</div>
        <div class="emp-info"><div class="emp-name">${esc(emp.name)}</div><div class="emp-role">${esc(emp.role||'Employee')}</div></div>
        <div class="emp-count ${allDone?'done-count':''}">${total>0?`<b>${doneCount}</b>/${total}`:'—'}</div>
      </div>
      ${isAdmin?`<div class="col-toolbar">
        <button class="col-tool-btn ${colSorted[emp.id]?'active':''}" data-action="sort-col" data-emp="${emp.id}">↕ ${colSorted[emp.id]?'Sorted':'Sort by priority'}</button>
      </div>`:''}
      ${allDone?`<div class="col-done-banner">✓ All done — great work!</div>`:''}
      <div class="task-list" data-emp="${emp.id}">${taskHTML}</div>
      ${isAdmin?`<div class="add-row"><button class="add-task-btn" data-action="open-add-task" data-emp="${emp.id}">+ Add Task</button></div>`:''}
    </div>`;
  }).join('');

  grid.innerHTML = globalAllDone
    ? `<div class="all-clear-banner"><div class="all-clear-icon">🎉</div><div class="all-clear-title">All Clear!</div><div class="all-clear-sub">Every task is done for today. Great work, team!</div></div>${colsHTML}`
    : colsHTML;

  if (isAdmin) setupDropOnColumns();

  // Show/hide "Clear Done" button
  const hasDone = employees.some(emp=>(todayTasks[emp.id]||[]).some(t=>t.done));
  $('btn-clear-done').classList.toggle('hide', !(isAdmin && hasDone));
}

// ── DRAG & DROP ─────────────────────────────────────
function setupDragFromQueue() {
  document.querySelectorAll('.q-chip[draggable="true"]').forEach(chip=>{
    chip.addEventListener('dragstart', e=>{
      dragTaskId=chip.dataset.task; chip.classList.add('dragging');
      document.body.classList.add('dragging-active'); e.dataTransfer.effectAllowed='move';
    });
    chip.addEventListener('dragend', ()=>{
      chip.classList.remove('dragging'); document.body.classList.remove('dragging-active');
      document.querySelectorAll('.emp-col.drag-over').forEach(el=>el.classList.remove('drag-over'));
      dragTaskId=null;
    });
  });
}
function setupDropOnColumns() {
  document.querySelectorAll('.emp-col').forEach(col=>{
    col.addEventListener('dragover',  e=>{ e.preventDefault(); col.classList.add('drag-over'); });
    col.addEventListener('dragleave', e=>{ if(!col.contains(e.relatedTarget)) col.classList.remove('drag-over'); });
    col.addEventListener('drop', e=>{
      e.preventDefault(); col.classList.remove('drag-over'); document.body.classList.remove('dragging-active');
      if (dragTaskId) assignTask(dragTaskId, col.dataset.emp);
    });
  });
}

// ── ASSIGN ──────────────────────────────────────────
async function assignTask(taskId, empId) {
  const task=unassigned.find(t=>t.id===taskId); if (!task) return;
  unassigned=unassigned.filter(t=>t.id!==taskId); task.employee_id=empId;
  const today=todayKey();
  if (!tasks[today]) tasks[today]={};
  if (!tasks[today][empId]) tasks[today][empId]=[];
  tasks[today][empId].push(task);
  renderBoard();
  const emp=employees.find(e=>e.id===empId);
  toast(`Assigned to ${emp?emp.name:'employee'}!`);
  await dbAssignTask(taskId, empId);
}
function openAssignModal(taskId) {
  assigningId=taskId;
  $('emp-pick-list').innerHTML=employees.map((emp,idx)=>`
    <div class="emp-pick-row" data-action="pick-employee" data-emp="${emp.id}">
      <div class="emp-pick-av ${colorFor(idx)}">${initials(emp.name)}</div>
      <div><div class="emp-pick-name">${esc(emp.name)}</div><div class="emp-pick-role">${esc(emp.role||'Employee')}</div></div>
    </div>`).join('');
  $('modal-assign').classList.add('on');
}

// ── TASK DETAIL MODAL ────────────────────────────────
function openDetail(taskId, empId) {
  const today=todayKey();
  const task=((tasks[today]||{})[empId]||[]).find(t=>t.id===taskId);
  if (!task) return;
  detailTaskId=taskId; detailEmpId=empId;
  const isAdmin=session.role==='admin';
  $('detail-modal-title').textContent = isAdmin?'Edit Task':'Task';
  $('detail-desc').value    = task.title;
  $('detail-pri').value     = task.priority;
  $('detail-desc').disabled = !isAdmin;
  $('detail-pri').disabled  = !isAdmin;
  isAdmin ? show('btn-detail-save') : hide('btn-detail-save');
  isAdmin ? show('btn-detail-delete') : hide('btn-detail-delete');
  renderNoteThread(task);
  $('note-input').value='';
  $('modal-detail').classList.add('on');
  setTimeout(()=>$('note-input').focus(), 350);
}

function renderNoteThread(task) {
  const thread=$('note-thread');
  if (!task.note||!task.note.trim()) { thread.innerHTML='<span class="note-empty">No notes yet</span>'; return; }
  const lines=task.note.split('\n').filter(Boolean);
  thread.innerHTML=lines.map(line=>{
    const sep=line.indexOf('||');
    const who=sep>-1?line.slice(0,sep):'?';
    const txt=sep>-1?line.slice(sep+2):line;
    const mine=who===session.userName;
    return `<div class="note-bubble ${mine?'mine':'theirs'}"><div class="note-who">${esc(who)}</div><div class="note-text">${esc(txt)}</div></div>`;
  }).join('');
  thread.scrollTop=thread.scrollHeight;
}

async function submitNote(silent=false) {
  const raw=$('note-input').value.trim(); if (!raw) return;
  const today=todayKey();
  const task=((tasks[today]||{})[detailEmpId]||[]).find(t=>t.id===detailTaskId); if (!task) return;
  const entry=`${session.userName}||${raw}`;
  task.note=(task.note?task.note.trim()+'\n':'')+entry;
  $('note-input').value='';
  renderNoteThread(task);
  if (!silent) toast('Note added!');
  // Update board note preview live
  const prev=document.querySelector(`[data-task="${detailTaskId}"] .task-note-preview`);
  if (prev) prev.textContent='💬 '+raw.split('\n')[0];
  await dbSaveNote(detailTaskId, task.note);
}

async function saveDetail() {
  if (session.role!=='admin') return;
  const title=$('detail-desc').value.trim(), priority=$('detail-pri').value;
  if (!title) { toast('Enter a description','var(--red)'); return; }
  await submitNote(true); // flush any pending note
  $('btn-detail-save').textContent='Saving…'; $('btn-detail-save').disabled=true;
  try {
    const today=todayKey();
    const task=((tasks[today]||{})[detailEmpId]||[]).find(t=>t.id===detailTaskId);
    if (task) { task.title=title; task.priority=priority; }
    await dbEditTask(detailTaskId, title, priority);
    $('modal-detail').classList.remove('on');
    renderBoard(); toast('Task updated!');
  } catch(e) { toast('Error: '+e.message,'var(--red)'); }
  finally { $('btn-detail-save').textContent='Save →'; $('btn-detail-save').disabled=false; }
}

async function deleteDetailTask() {
  if (!detailTaskId||!detailEmpId) return;
  $('modal-detail').classList.remove('on');
  const today=todayKey();
  if (tasks[today]?.[detailEmpId]) tasks[today][detailEmpId]=tasks[today][detailEmpId].filter(t=>t.id!==detailTaskId);
  renderBoard(); toast('Task deleted');
  await dbDeleteTask(detailTaskId);
}

// ── TASK ACTIONS ────────────────────────────────────
async function toggleTask(taskId, empId) {
  if (session.role==='employee'&&session.userId!==empId) { toast('You can only check your own tasks','var(--red)'); return; }
  const today=todayKey();
  const task=((tasks[today]||{})[empId]||[]).find(t=>t.id===taskId); if (!task) return;
  task.done=!task.done; task.completed_at=task.done?new Date().toISOString():null;
  renderBoard(); if (task.done) toast('Task completed! ✓');
  await dbToggleTask(taskId, task.done);
}

async function deleteTask(taskId, empId) {
  if (session.role!=='admin') return;
  const today=todayKey();
  if (tasks[today]?.[empId]) tasks[today][empId]=tasks[today][empId].filter(t=>t.id!==taskId);
  renderBoard(); await dbDeleteTask(taskId);
}

async function deleteUnassigned(taskId) {
  unassigned=unassigned.filter(t=>t.id!==taskId); renderQueue(); await dbDeleteTask(taskId);
}

async function clearDoneTasks() {
  if (session.role!=='admin') return;
  const today=todayKey(); const toDelete=[];
  employees.forEach(emp=>{ (tasks[today]?.[emp.id]||[]).filter(t=>t.done).forEach(t=>{ toDelete.push({taskId:t.id,empId:emp.id}); }); });
  if (!toDelete.length) return;
  if (!confirm(`Clear ${toDelete.length} completed task${toDelete.length>1?'s':''}?`)) return;
  toDelete.forEach(({taskId,empId})=>{ tasks[today][empId]=tasks[today][empId].filter(t=>t.id!==taskId); });
  renderBoard(); toast(`Cleared ${toDelete.length} task${toDelete.length>1?'s':''}!`);
  await Promise.all(toDelete.map(({taskId})=>dbDeleteTask(taskId)));
}

function openAddTask(empId) {
  addTaskEmpId=empId;
  $('modal-task-title').textContent=empId?'Add Task':'Add Unassigned Task';
  $('m-task-text').value=''; $('m-task-pri').value='mid';
  $('modal-task').classList.add('on'); setTimeout(()=>$('m-task-text').focus(),300);
}

async function saveTask() {
  const title=$('m-task-text').value.trim(); if (!title) { toast('Enter a task description','var(--red)'); return; }
  const priority=$('m-task-pri').value, today=todayKey();
  $('btn-save-task').textContent='Saving…'; $('btn-save-task').disabled=true;
  try {
    const t=await dbAddTask(session.companyId, addTaskEmpId, today, title, priority);
    if (addTaskEmpId) { if(!tasks[today])tasks[today]={}; if(!tasks[today][addTaskEmpId])tasks[today][addTaskEmpId]=[]; tasks[today][addTaskEmpId].push(t); }
    else { unassigned.push(t); }
    $('modal-task').classList.remove('on'); renderBoard();
    toast(addTaskEmpId?'Task added!':'Added to queue!');
  } catch(e) { toast('Error: '+e.message,'var(--red)'); }
  finally { $('btn-save-task').textContent='Add Task →'; $('btn-save-task').disabled=false; }
}

function toggleColSort(empId) {
  colSorted[empId]=!colSorted[empId]; renderBoard();
  toast(colSorted[empId]?'Sorted: high → low':'Sort cleared');
}

// ── EMPLOYEES ───────────────────────────────────────
async function saveEmployee() {
  const name=$('m-emp-name').value.trim(), role=$('m-emp-role').value.trim();
  if (!name) { toast('Enter employee name','var(--red)'); return; }
  if (employees.find(e=>e.name.toLowerCase()===name.toLowerCase())) { toast('Already exists','var(--red)'); return; }
  $('btn-save-emp').textContent='Saving…'; $('btn-save-emp').disabled=true;
  try {
    const emp=await dbAddEmployee(session.companyId, name, role);
    employees.push(emp); $('modal-emp').classList.remove('on'); renderBoard(); renderTeam(); toast(`${name} added!`);
  } catch(e) { toast('Error: '+e.message,'var(--red)'); }
  finally { $('btn-save-emp').textContent='Add →'; $('btn-save-emp').disabled=false; }
}

async function removeEmployee(empId) {
  const emp=employees.find(e=>e.id===empId);
  if (!emp||!confirm(`Remove ${emp.name}?`)) return;
  employees=employees.filter(e=>e.id!==empId);
  renderTeam(); renderBoard(); await dbRemoveEmployee(empId); toast(`${emp.name} removed`);
}

// ── HISTORY ─────────────────────────────────────────
function renderHistory() {
  const grid=$('hist-grid');
  const days=[]; for(let i=0;i<30;i++){const d=new Date();d.setDate(d.getDate()-i);days.push(d.toISOString().slice(0,10));}
  const populated=days.filter(d=>tasks[d]&&Object.values(tasks[d]).some(a=>a.length>0));
  if (!populated.length) { grid.innerHTML=`<div class="empty" style="grid-column:1/-1"><div class="empty-icon">📅</div>No history yet.</div>`; return; }
  grid.innerHTML=populated.map(dateKey=>{
    const dt=tasks[dateKey]||{}; let total=0,done=0,rows='';
    employees.forEach(emp=>{
      const et=dt[emp.id]||[]; if(!et.length)return;
      total+=et.length; const d=et.filter(t=>t.done).length; done+=d;
      rows+=`<div class="day-emp"><div class="day-emp-name">${esc(emp.name)}</div><div class="day-emp-stat">${d}/${et.length}</div></div>
        <div class="day-tasks">${et.map(t=>{
          const noteLines=t.note?t.note.split('\n').filter(Boolean):[];
          const notesHTML=noteLines.map(line=>{const sep=line.indexOf('||');const who=sep>-1?line.slice(0,sep):'';const txt=sep>-1?line.slice(sep+2):line;return`<div class="day-task-note">💬 ${esc(who)}: ${esc(txt)}</div>`;}).join('');
          return`<div class="day-task-item ${t.done?'done':''}">${t.done?'✓':'○'} ${esc(t.title)}</div>${notesHTML}`;
        }).join('')}</div>`;
    });
    if (!rows) return '';
    const pct=total>0?Math.round(done/total*100):0;
    const label=new Date(dateKey+'T12:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
    return `<div class="day-card"><div class="day-head"><div class="day-date">${label}</div><div class="day-stat">${done}/${total} · ${pct}%</div></div><div class="prog"><div class="prog-fill" style="width:${pct}%"></div></div><div class="day-body">${rows}</div></div>`;
  }).filter(Boolean).join('');
}

// ── TEAM ────────────────────────────────────────────
function renderTeam() {
  const grid=$('team-grid');
  if (!employees.length){grid.innerHTML=`<div class="empty" style="grid-column:1/-1"><div class="empty-icon">👥</div>No employees yet.</div>`;return;}
  grid.innerHTML=employees.map((emp,idx)=>`
    <div class="team-card">
      <div class="team-av ${colorFor(idx)}">${initials(emp.name)}</div>
      <div class="team-info"><div class="team-name">${esc(emp.name)}</div><div class="team-role">${esc(emp.role||'Employee')}</div></div>
      <div class="icon-btn" data-action="del-emp" data-emp="${emp.id}" style="color:var(--red);border-color:var(--red);opacity:0.6;">
        <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.8"><line x1="2" y1="2" x2="12" y2="12"/><line x1="12" y1="2" x2="2" y2="12"/></svg>
      </div>
    </div>`).join('');
}

// ── CHANGE PIN ──────────────────────────────────────
async function savePin() {
  const current=$('m-pin-current').value.trim(), newPin=$('m-pin-new').value.trim(), confirm=$('m-pin-confirm').value.trim();
  const co=await dbGetCompany(session.companyName);
  if (!co||current!==co.pin) { toast('Current PIN is wrong','var(--red)'); return; }
  if (newPin.length<4)       { toast('PIN must be at least 4 digits','var(--red)'); return; }
  if (newPin!==confirm)      { toast('PINs do not match','var(--red)'); return; }
  $('btn-save-pin').textContent='Saving…'; $('btn-save-pin').disabled=true;
  try { await dbUpdatePin(session.companyId, newPin); $('modal-pin').classList.remove('on'); toast('PIN updated! ✓'); }
  catch(e) { toast('Error: '+e.message,'var(--red)'); }
  finally { $('btn-save-pin').textContent='Save PIN →'; $('btn-save-pin').disabled=false; }
}

// ── EXPORT ──────────────────────────────────────────
function exportCSV() {
  let csv='Date,Employee,Role,Task,Priority,Status,Notes,Created,Completed\n';
  Object.keys(tasks).sort().reverse().forEach(dk=>{
    employees.forEach(emp=>{
      (tasks[dk][emp.id]||[]).forEach(t=>{
        const d=new Date(dk+'T12:00:00').toLocaleDateString('en-US');
        const notes=(t.note||'').split('\n').filter(Boolean).map(l=>{const s=l.indexOf('||');return s>-1?l.slice(0,s)+': '+l.slice(s+2):l;}).join(' | ');
        csv+=`"${d}","${emp.name}","${emp.role||''}","${t.title.replace(/"/g,'""')}","${t.priority}","${t.done?'Done':'Pending'}","${notes.replace(/"/g,'""')}","${t.created_at}","${t.completed_at||''}"\n`;
      });
    });
  });
  const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download=session.companyName.replace(/\s+/g,'_')+'_tasks.csv'; a.click(); toast('CSV downloaded!');
}

// ── TABS ────────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('on',b.dataset.tab===tab));
  ['board','history','team'].forEach(v=>$('view-'+v).classList.toggle('on',v===tab));
  if (tab==='history') renderHistory();
  if (tab==='team')    renderTeam();
}

// ── EVENT DELEGATION ────────────────────────────────
document.addEventListener('click', function(e) {
  const el=e.target.closest('[data-action]');
  if (!el) { const t=e.target.closest('.tab-btn'); if(t?.dataset.tab) switchTab(t.dataset.tab); return; }
  const a=el.dataset.action, emp=el.dataset.emp, task=el.dataset.task;

  if (a==='toggle')        { e.stopPropagation(); toggleTask(task,emp); return; }
  if (a==='del-task')      { e.stopPropagation(); deleteTask(task,emp); return; }
  if (a==='open-detail')   { if(!e.target.closest('.check-box,.del-btn,.q-chip-assign,.q-chip-del')) openDetail(task,emp); return; }
  if (a==='open-add-task') { openAddTask(emp); return; }
  if (a==='del-emp')       { removeEmployee(emp); return; }
  if (a==='open-assign')   { e.stopPropagation(); openAssignModal(task); return; }
  if (a==='del-unassigned'){ e.stopPropagation(); deleteUnassigned(task); return; }
  if (a==='sort-col')      { toggleColSort(emp); return; }
  if (a==='pick-employee') { $('modal-assign').classList.remove('on'); if(assigningId) assignTask(assigningId,emp); assigningId=null; return; }
});

// ── MIDNIGHT AUTO-CLEAR ─────────────────────────────
// Deletes completed tasks from any day before today from the DB.
// Runs once on load, then schedules itself to fire again at the next midnight.
async function clearOldDoneTasks() {
  if (!session?.companyId) return;
  const today = todayKey();
  const toDelete = [];
  Object.keys(tasks).forEach(dk => {
    if (dk >= today) return; // only past days
    Object.values(tasks[dk]).forEach(arr => {
      arr.filter(t => t.done).forEach(t => toDelete.push(t.id));
    });
  });
  if (!toDelete.length) return;
  // Remove from local state
  Object.keys(tasks).forEach(dk => {
    if (dk >= today) return;
    Object.keys(tasks[dk]).forEach(eid => {
      tasks[dk][eid] = tasks[dk][eid].filter(t => !toDelete.includes(t.id));
    });
  });
  // Delete from Supabase in one go
  await sb.from('tasks').delete().in('id', toDelete);
}

function scheduleMidnightClear() {
  const now  = new Date();
  const next = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1, 0, 0, 5); // 12:00:05 AM
  const ms   = next - now;
  setTimeout(async () => {
    await loadAll();          // reload fresh data at midnight
    await clearOldDoneTasks();
    scheduleMidnightClear();  // reschedule for next midnight
  }, ms);
}

// AUTO LOGIN
(async()=>{
  if (session?.companyId) {
    try {
      await enterApp();
      await clearOldDoneTasks(); // clean up any old done tasks on load
      scheduleMidnightClear();   // keep running until page closes
    } catch(e) { LS.set('bf_session',null); }
  }
})();
